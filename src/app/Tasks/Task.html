
@if(isAdingTask){
  <app-new-task (cancel)="onCancelAddTask()"></app-new-task>
}
<section id="tasks">
  <header>
    <h2>{{ name}} 's Tasks </h2>
  
  <menu>
    <button (click)="onStartAddTask()">Add Task</button>
  </menu>
</header>
<ul>
  @for (tas of SelectedUserTask;track tas.id){
  <li>
    <app-tas [tas]="tas" (complete)="onCompleteTask($event)"></app-tas>
  </li>}
</ul>
</section>
