<app-header />

<main>
  <ul id="users">
    <!-- @for(user of users;track user.id){ -->
      <li *ngFor=" let user of users">
        <app-user [user]="user" selected="user.id===selectedId" (select)="onSelectUser($event)"/>
      </li>
    <!-- } -->
  </ul>
    
  
    @if (SelectedUser)
    {
      <app-tasks [userid]="SelectedUser.id" [name]="SelectedUser!.name"></app-tasks>
    }
    @else{
      <!-- <ng-template #fallback> -->
        <p id="fallback">Select the User to see their Tasks</p>
      <!-- </ng-template> -->
      
    }
   
  
</main>
